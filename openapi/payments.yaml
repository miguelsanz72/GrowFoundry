openapi: 3.0.3
info:
  title: Growfoundry Payments API
  version: 1.0.0
  description: Stripe payment setup, catalog management, runtime Checkout Sessions, Billing Portal Sessions, and webhook projections

tags:
  - name: Client
    description: Runtime routes used by applications with a user token
  - name: Admin
    description: Project-admin routes for Stripe keys, catalog management, sync, and projections
  - name: Webhooks
    description: Stripe webhook ingestion routes

paths:
  /api/payments/{environment}/checkout-sessions:
    post:
      summary: Create Checkout Session
      description: Create a local checkout attempt with the caller's user context and then create a Stripe Checkout Session. Subscription mode requires a billing subject.
      tags:
        - Client
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/EnvironmentPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCheckoutSessionBody'
            example:
              mode: "subscription"
              lineItems:
                - stripePriceId: "price_123"
                  quantity: 1
              successUrl: "https://app.example.com/billing/success"
              cancelUrl: "https://app.example.com/billing/cancel"
              subject:
                type: "team"
                id: "team_123"
              customerEmail: "buyer@example.com"
              idempotencyKey: "checkout-team_123-pro"
      responses:
        '201':
          description: Checkout Session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateCheckoutSessionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/payments/{environment}/customer-portal-sessions:
    post:
      summary: Create Customer Portal Session
      description: Create a Stripe Billing Portal Session for an authenticated user's mapped billing subject.
      tags:
        - Client
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/EnvironmentPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCustomerPortalSessionBody'
            example:
              subject:
                type: "team"
                id: "team_123"
              returnUrl: "https://app.example.com/billing"
      responses:
        '201':
          description: Customer Portal Session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateCustomerPortalSessionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/payments/status:
    get:
      summary: Get Payments Status
      description: Return Stripe connection, sync, and managed webhook status for each environment.
      tags:
        - Admin
      security:
        - bearerAuth: []
        - apiKey: []
      responses:
        '200':
          description: Payments status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetPaymentsStatusResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/payments/config:
    get:
      summary: Get Stripe Key Configuration
      description: Return masked Stripe key configuration for test and live environments.
      tags:
        - Admin
      security:
        - bearerAuth: []
        - apiKey: []
      responses:
        '200':
          description: Stripe key configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetPaymentsConfigResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/payments/{environment}/config:
    put:
      summary: Configure Stripe Secret Key
      description: Validate and store a Stripe secret key. New Stripe accounts attempt managed webhook setup and then run a unified sync.
      tags:
        - Admin
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/EnvironmentPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertPaymentsConfigBody'
            example:
              secretKey: "sk_test_xxx"
      responses:
        '200':
          description: Updated Stripe key configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetPaymentsConfigResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    delete:
      summary: Remove Stripe Secret Key
      description: Remove the configured Stripe secret key for one environment and best-effort remove managed webhook endpoints.
      tags:
        - Admin
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/EnvironmentPath'
      responses:
        '200':
          description: Updated Stripe key configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetPaymentsConfigResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/payments/sync:
    post:
      summary: Sync Stripe Payments State
      description: Sync products, prices, customers, and subscriptions for every configured Stripe environment. Stripe remains the source of truth.
      tags:
        - Admin
      security:
        - bearerAuth: []
        - apiKey: []
      responses:
        '200':
          description: Sync result for configured environments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncPaymentsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/payments/{environment}/sync:
    post:
      summary: Sync Stripe Payments State For One Environment
      description: Sync products, prices, customers, and subscriptions for one Stripe environment. Stripe remains the source of truth.
      tags:
        - Admin
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/EnvironmentPath'
      responses:
        '200':
          description: Sync result for the requested environment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncPaymentsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/payments/{environment}/webhook:
    post:
      summary: Configure Managed Stripe Webhook
      description: Create or recreate the GrowFoundry-managed Stripe webhook endpoint for one environment.
      tags:
        - Admin
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/EnvironmentPath'
      responses:
        '200':
          description: Managed webhook configuration result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigurePaymentWebhookResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/payments/{environment}/catalog:
    get:
      summary: List Payment Catalog
      description: Return mirrored Stripe products and prices for one environment.
      tags:
        - Admin
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/EnvironmentPath'
      responses:
        '200':
          description: Synced Stripe products and prices
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListPaymentCatalogResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/payments/{environment}/catalog/products:
    get:
      summary: List Products
      description: List mirrored Stripe products for one environment.
      tags:
        - Admin
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/EnvironmentPath'
      responses:
        '200':
          description: Products
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListPaymentProductsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    post:
      summary: Create Product
      description: Create a Stripe product in the requested environment, then mirror it locally after Stripe succeeds.
      tags:
        - Admin
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/EnvironmentPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePaymentProductBody'
            example:
              name: "Pro Plan"
              description: "Monthly access to Pro features"
              active: true
              metadata:
                tier: "pro"
              idempotencyKey: "product-pro-plan"
      responses:
        '201':
          description: Product created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MutatePaymentProductResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/payments/{environment}/catalog/products/{productId}:
    get:
      summary: Get Product
      description: Get one mirrored Stripe product and its associated prices.
      tags:
        - Admin
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/EnvironmentPath'
        - $ref: '#/components/parameters/ProductIdPath'
      responses:
        '200':
          description: Product and prices
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetPaymentProductResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      summary: Update Product
      description: Update a Stripe product, then mirror it locally after Stripe succeeds.
      tags:
        - Admin
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/EnvironmentPath'
        - $ref: '#/components/parameters/ProductIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePaymentProductBody'
            example:
              name: "Pro Plan"
              active: true
      responses:
        '200':
          description: Product updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MutatePaymentProductResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      summary: Delete Product
      description: Delete a Stripe product from one environment, then remove it from the local mirror.
      tags:
        - Admin
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/EnvironmentPath'
        - $ref: '#/components/parameters/ProductIdPath'
      responses:
        '200':
          description: Product deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeletePaymentProductResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/payments/{environment}/catalog/prices:
    get:
      summary: List Prices
      description: List mirrored Stripe prices for one environment, optionally filtered by product.
      tags:
        - Admin
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/EnvironmentPath'
        - name: stripeProductId
          in: query
          required: false
          schema:
            type: string
            minLength: 1
          description: Filter prices by Stripe product ID.
          example: "prod_123"
      responses:
        '200':
          description: Prices
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListPaymentPricesResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    post:
      summary: Create Price
      description: Create a Stripe price in the requested environment, then mirror it locally after Stripe succeeds.
      tags:
        - Admin
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/EnvironmentPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePaymentPriceBody'
            example:
              stripeProductId: "prod_123"
              currency: "usd"
              unitAmount: 2900
              recurring:
                interval: "month"
                intervalCount: 1
              lookupKey: "pro_monthly"
              idempotencyKey: "price-pro-monthly"
      responses:
        '201':
          description: Price created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MutatePaymentPriceResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/payments/{environment}/catalog/prices/{priceId}:
    get:
      summary: Get Price
      description: Get one mirrored Stripe price.
      tags:
        - Admin
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/EnvironmentPath'
        - $ref: '#/components/parameters/PriceIdPath'
      responses:
        '200':
          description: Price
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetPaymentPriceResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      summary: Update Price
      description: Update mutable Stripe price fields, then mirror the price locally after Stripe succeeds.
      tags:
        - Admin
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/EnvironmentPath'
        - $ref: '#/components/parameters/PriceIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePaymentPriceBody'
            example:
              active: true
              lookupKey: "pro_monthly"
      responses:
        '200':
          description: Price updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MutatePaymentPriceResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      summary: Archive Price
      description: Archive a Stripe price in one environment, then mirror the archived state locally.
      tags:
        - Admin
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/EnvironmentPath'
        - $ref: '#/components/parameters/PriceIdPath'
      responses:
        '200':
          description: Price archived
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArchivePaymentPriceResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/payments/{environment}/subscriptions:
    get:
      summary: List Subscriptions
      description: Admin/debug read for mirrored Stripe subscriptions. Use app-owned tables with RLS for end-user payment state.
      tags:
        - Admin
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/EnvironmentPath'
        - $ref: '#/components/parameters/SubjectTypeQuery'
        - $ref: '#/components/parameters/SubjectIdQuery'
        - $ref: '#/components/parameters/LimitQuery'
      responses:
        '200':
          description: Subscriptions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListSubscriptionsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/payments/{environment}/customers:
    get:
      summary: List Customers
      description: Admin/debug read for mirrored Stripe customers. This is a display mirror only and should not replace app-owned billing tables.
      tags:
        - Admin
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/EnvironmentPath'
        - $ref: '#/components/parameters/LimitQuery'
      responses:
        '200':
          description: Customers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListPaymentCustomersResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/payments/{environment}/payment-history:
    get:
      summary: List Payment History
      description: Admin/debug read for mirrored payment history. Use app-owned fulfillment tables with RLS for end-user order, credit, or entitlement state.
      tags:
        - Admin
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/EnvironmentPath'
        - $ref: '#/components/parameters/SubjectTypeQuery'
        - $ref: '#/components/parameters/SubjectIdQuery'
        - $ref: '#/components/parameters/LimitQuery'
      responses:
        '200':
          description: Payment history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListPaymentHistoryResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/webhooks/stripe/{environment}:
    post:
      summary: Receive Stripe Webhook
      description: Receive Stripe events for one environment. The request body must be the raw Stripe JSON body and must include the Stripe signature header.
      tags:
        - Webhooks
      security:
        - stripeSignature: []
      parameters:
        - $ref: '#/components/parameters/EnvironmentPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Webhook received
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StripeWebhookResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    apiKey:
      type: apiKey
      in: header
      name: x-api-key
    stripeSignature:
      type: apiKey
      in: header
      name: stripe-signature

  parameters:
    EnvironmentPath:
      name: environment
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/StripeEnvironment'
      description: Stripe environment.
    ProductIdPath:
      name: productId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
      description: Stripe product ID.
      example: "prod_123"
    PriceIdPath:
      name: priceId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
      description: Stripe price ID.
      example: "price_123"
    SubjectTypeQuery:
      name: subjectType
      in: query
      required: false
      schema:
        type: string
        minLength: 1
        maxLength: 100
      description: Billing subject type. Must be provided together with subjectId.
      example: "team"
    SubjectIdQuery:
      name: subjectId
      in: query
      required: false
      schema:
        type: string
        minLength: 1
        maxLength: 255
      description: Billing subject ID. Must be provided together with subjectType.
      example: "team_123"
    LimitQuery:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50
      description: Maximum rows to return.

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    StripeEnvironment:
      type: string
      enum:
        - test
        - live

    StripeConnectionStatus:
      type: string
      enum:
        - unconfigured
        - connected
        - error

    StripeLatestSyncStatus:
      type: string
      enum:
        - succeeded
        - failed

    Metadata:
      type: object
      additionalProperties:
        type: string

    ErrorResponse:
      type: object
      required:
        - error
        - message
        - statusCode
      properties:
        error:
          type: string
          example: "INVALID_INPUT"
        message:
          type: string
          example: "environment: Invalid enum value"
        statusCode:
          type: integer
          example: 400
        nextActions:
          type: string
          nullable: true

    StripeConnection:
      type: object
      required:
        - environment
        - status
        - stripeAccountId
        - stripeAccountEmail
        - accountLivemode
        - webhookEndpointId
        - webhookEndpointUrl
        - webhookConfiguredAt
        - maskedKey
        - lastSyncedAt
        - lastSyncStatus
        - lastSyncError
        - lastSyncCounts
      properties:
        environment:
          $ref: '#/components/schemas/StripeEnvironment'
        status:
          $ref: '#/components/schemas/StripeConnectionStatus'
        stripeAccountId:
          type: string
          nullable: true
          example: "acct_123"
        stripeAccountEmail:
          type: string
          nullable: true
          example: "owner@example.com"
        accountLivemode:
          type: boolean
          nullable: true
        webhookEndpointId:
          type: string
          nullable: true
          example: "we_123"
        webhookEndpointUrl:
          type: string
          nullable: true
          example: "https://api.example.com/api/webhooks/stripe/test"
        webhookConfiguredAt:
          type: string
          format: date-time
          nullable: true
        maskedKey:
          type: string
          nullable: true
          example: "sk_test_...abcd"
        lastSyncedAt:
          type: string
          format: date-time
          nullable: true
        lastSyncStatus:
          allOf:
            - $ref: '#/components/schemas/StripeLatestSyncStatus'
          nullable: true
        lastSyncError:
          type: string
          nullable: true
        lastSyncCounts:
          type: object
          additionalProperties:
            type: number

    StripeProduct:
      type: object
      required:
        - environment
        - stripeProductId
        - name
        - description
        - active
        - defaultPriceId
        - metadata
        - syncedAt
      properties:
        environment:
