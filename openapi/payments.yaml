openapi: 3.0.3
info:
  title: Insforge Payments API
  version: 1.0.0
  description: Payment provider setup, catalog management, Stripe runtime sessions, and webhook projections

tags:
  - name: Client
    description: Runtime routes used by applications with a user token
  - name: Admin
    description: Project-admin routes for provider keys, catalog management, sync, and projections
  - name: Webhooks
    description: Payment provider webhook ingestion routes

paths:
  /api/payments/stripe/{environment}/checkout-sessions:
    post:
      summary: Create Checkout Session
      description: Create a local checkout attempt with the caller's user context and then create a Stripe Checkout Session. Subscription mode requires a billing subject.
      tags:
        - Client
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/EnvironmentPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCheckoutSessionBody'
            example:
              mode: "subscription"
              lineItems:
                - priceId: "price_123"
                  quantity: 1
              successUrl: "https://app.example.com/billing/success"
              cancelUrl: "https://app.example.com/billing/cancel"
              subject:
                type: "team"
                id: "team_123"
              customerEmail: "buyer@example.com"
              idempotencyKey: "checkout-team_123-pro"
      responses:
        '201':
          description: Checkout Session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateCheckoutSessionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/payments/stripe/{environment}/customer-portal-sessions:
    post:
      summary: Create Customer Portal Session
      description: Create a Stripe Billing Portal Session for an authenticated user's mapped billing subject.
      tags:
        - Client
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/EnvironmentPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCustomerPortalSessionBody'
            example:
              subject:
                type: "team"
                id: "team_123"
              returnUrl: "https://app.example.com/billing"
      responses:
        '201':
          description: Customer Portal Session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateCustomerPortalSessionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/payments/stripe/status:
    get:
      summary: Get Payments Status
      description: Return Stripe connection, sync, and managed webhook status for each environment.
      tags:
        - Admin
      security:
        - bearerAuth: []
        - apiKey: []
      responses:
        '200':
          description: Payments status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetPaymentsStatusResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/payments/stripe/config:
    get:
      summary: Get Stripe Key Configuration
      description: Return masked Stripe key configuration for test and live environments.
      tags:
        - Admin
      security:
        - bearerAuth: []
        - apiKey: []
      responses:
        '200':
          description: Stripe key configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetPaymentsConfigResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/payments/stripe/{environment}/config:
    put:
      summary: Configure Stripe Secret Key
      description: Validate and store a Stripe secret key. New Stripe accounts attempt managed webhook setup and then run a unified sync.
      tags:
        - Admin
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/EnvironmentPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertPaymentsConfigBody'
            example:
              secretKey: "sk_test_xxx"
      responses:
        '200':
          description: Updated Stripe key configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetPaymentsConfigResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    delete:
      summary: Remove Stripe Secret Key
      description: Remove the configured Stripe secret key for one environment and best-effort remove managed webhook endpoints.
      tags:
        - Admin
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/EnvironmentPath'
      responses:
        '200':
          description: Updated Stripe key configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetPaymentsConfigResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/payments/stripe/sync:
    post:
      summary: Sync Stripe Payments State
      description: Sync products, prices, customers, and subscriptions for every configured Stripe environment. Stripe remains the source of truth.
      tags:
        - Admin
      security:
        - bearerAuth: []
        - apiKey: []
      responses:
        '200':
          description: Sync result for configured environments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncPaymentsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/payments/stripe/{environment}/sync:
    post:
      summary: Sync Stripe Payments State For One Environment
      description: Sync products, prices, customers, and subscriptions for one Stripe environment. Stripe remains the source of truth.
      tags:
        - Admin
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/EnvironmentPath'
      responses:
        '200':
          description: Sync result for the requested environment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncPaymentsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/payments/stripe/{environment}/webhook:
    post:
      summary: Configure Managed Stripe Webhook
      description: Create or recreate the InsForge-managed Stripe webhook endpoint for one environment.
      tags:
        - Admin
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/EnvironmentPath'
      responses:
        '200':
          description: Managed webhook configuration result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigurePaymentWebhookResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/payments/stripe/{environment}/catalog:
    get:
      summary: List Payment Catalog
      description: Return mirrored Stripe products and prices for one environment.
      tags:
        - Admin
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/EnvironmentPath'
      responses:
        '200':
          description: Synced Stripe products and prices
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListStripeCatalogResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/payments/stripe/{environment}/catalog/products:
    get:
      summary: List Products
      description: List mirrored Stripe products for one environment.
      tags:
        - Admin
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/EnvironmentPath'
      responses:
        '200':
          description: Products
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListStripeProductsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    post:
      summary: Create Product
      description: Create a Stripe product in the requested environment, then mirror it locally after Stripe succeeds.
      tags:
        - Admin
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/EnvironmentPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateStripeProductBody'
            example:
              name: "Pro Plan"
              description: "Monthly access to Pro features"
              active: true
              metadata:
                tier: "pro"
              idempotencyKey: "product-pro-plan"
      responses:
        '201':
          description: Product created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MutateStripeProductResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/payments/stripe/{environment}/catalog/products/{productId}:
    get:
      summary: Get Product
      description: Get one mirrored Stripe product and its associated prices.
      tags:
        - Admin
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/EnvironmentPath'
        - $ref: '#/components/parameters/ProductIdPath'
      responses:
        '200':
          description: Product and prices
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetStripeProductResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      summary: Update Product
      description: Update a Stripe product, then mirror it locally after Stripe succeeds.
      tags:
        - Admin
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/EnvironmentPath'
        - $ref: '#/components/parameters/ProductIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateStripeProductBody'
            example:
              name: "Pro Plan"
              active: true
      responses:
        '200':
          description: Product updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MutateStripeProductResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      summary: Delete Product
      description: Delete a Stripe product from one environment, then remove it from the local mirror.
      tags:
        - Admin
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/EnvironmentPath'
        - $ref: '#/components/parameters/ProductIdPath'
      responses:
        '200':
          description: Product deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteStripeProductResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/payments/stripe/{environment}/catalog/prices:
    get:
      summary: List Prices
      description: List mirrored Stripe prices for one environment, optionally filtered by product.
      tags:
        - Admin
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/EnvironmentPath'
        - name: productId
          in: query
          required: false
          schema:
            type: string
            minLength: 1
          description: Filter prices by Stripe product ID.
          example: "prod_123"
      responses:
        '200':
          description: Prices
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListStripePricesResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    post:
      summary: Create Price
      description: Create a Stripe price in the requested environment, then mirror it locally after Stripe succeeds.
      tags:
        - Admin
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/EnvironmentPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateStripePriceBody'
            example:
              productId: "prod_123"
              currency: "usd"
              unitAmount: 2900
              recurring:
                interval: "month"
                intervalCount: 1
              lookupKey: "pro_monthly"
              idempotencyKey: "price-pro-monthly"
      responses:
        '201':
          description: Price created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MutateStripePriceResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/payments/stripe/{environment}/catalog/prices/{priceId}:
    get:
      summary: Get Price
      description: Get one mirrored Stripe price.
      tags:
        - Admin
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/EnvironmentPath'
        - $ref: '#/components/parameters/PriceIdPath'
      responses:
        '200':
          description: Price
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetStripePriceResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      summary: Update Price
      description: Update mutable Stripe price fields, then mirror the price locally after Stripe succeeds.
      tags:
        - Admin
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/EnvironmentPath'
        - $ref: '#/components/parameters/PriceIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateStripePriceBody'
            example:
              active: true
              lookupKey: "pro_monthly"
      responses:
        '200':
          description: Price updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MutateStripePriceResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      summary: Archive Price
      description: Archive a Stripe price in one environment, then mirror the archived state locally.
      tags:
        - Admin
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/EnvironmentPath'
        - $ref: '#/components/parameters/PriceIdPath'
      responses:
        '200':
          description: Price archived
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArchiveStripePriceResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/payments/stripe/{environment}/subscriptions:
    get:
      summary: List Subscriptions
      description: Admin/debug read for mirrored Stripe subscriptions. Use app-owned tables with RLS for end-user payment state.
      tags:
        - Admin
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/EnvironmentPath'
        - $ref: '#/components/parameters/SubjectTypeQuery'
        - $ref: '#/components/parameters/SubjectIdQuery'
        - $ref: '#/components/parameters/LimitQuery'
      responses:
        '200':
          description: Subscriptions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListStripeSubscriptionsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/payments/stripe/{environment}/customers:
    get:
      summary: List Customers
      description: Admin/debug read for mirrored Stripe customers. This is a display mirror only and should not replace app-owned billing tables.
      tags:
        - Admin
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/EnvironmentPath'
        - $ref: '#/components/parameters/LimitQuery'
      responses:
        '200':
          description: Customers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListPaymentCustomersResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/payments/stripe/{environment}/payment-activity:
    get:
      summary: List Payment Activity
      description: Admin/debug read for mirrored payment activity. Use app-owned fulfillment tables with RLS for end-user order, credit, or entitlement state.
      tags:
        - Admin
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/EnvironmentPath'
        - $ref: '#/components/parameters/SubjectTypeQuery'
        - $ref: '#/components/parameters/SubjectIdQuery'
        - $ref: '#/components/parameters/LimitQuery'
      responses:
        '200':
          description: Payment history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListPaymentActivityResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/payments/razorpay/status:
    get:
      summary: Get Razorpay Payments Status
      description: Return Razorpay connection and sync status for each environment.
      tags:
        - Admin
      security:
        - bearerAuth: []
        - apiKey: []
      responses:
        '200':
          description: Razorpay payments status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetRazorpayStatusResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/payments/razorpay/config:
    get:
      summary: Get Razorpay Key Configuration
      description: Return masked Razorpay key configuration for test and live environments.
      tags:
        - Admin
      security:
        - bearerAuth: []
        - apiKey: []
      responses:
        '200':
          description: Razorpay key configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetRazorpayConfigResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/payments/razorpay/sync:
    post:
      summary: Sync Razorpay Payments State
      description: Sync plans, items, customers, subscriptions, and payments for every configured Razorpay environment. Razorpay remains the source of truth.
      tags:
        - Admin
      security:
        - bearerAuth: []
        - apiKey: []
      responses:
        '200':
          description: Sync result for configured Razorpay environments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncRazorpayPaymentsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/payments/razorpay/{environment}/config:
    put:
      summary: Configure Razorpay Keys
      description: Validate and store Razorpay API keys, optionally with a webhook secret, for one environment.
      tags:
        - Admin
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/EnvironmentPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertRazorpayConfigBody'
            example:
              keyId: "rzp_test_xxx"
              keySecret: "razorpay_secret_xxx"
              webhookSecret: "webhook_secret_xxx"
      responses:
        '200':
          description: Updated Razorpay key configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetRazorpayConfigResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    delete:
      summary: Remove Razorpay Keys
      description: Remove the configured Razorpay keys for one environment.
      tags:
        - Admin
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/EnvironmentPath'
      responses:
        '200':
          description: Updated Razorpay key configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetRazorpayConfigResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/payments/razorpay/{environment}/webhook-secret:
    put:
      summary: Configure Razorpay Webhook Secret
      description: Store the Razorpay webhook signing secret for one environment.
      tags:
        - Admin
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/EnvironmentPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertRazorpayWebhookSecretBody'
            example:
              webhookSecret: "webhook_secret_xxx"
      responses:
        '200':
          description: Webhook secret stored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpsertRazorpayWebhookSecretResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/payments/razorpay/{environment}/sync:
    post:
      summary: Sync Razorpay Payments State For One Environment
      description: Sync plans, items, customers, subscriptions, and payments for one Razorpay environment. Razorpay remains the source of truth.
      tags:
        - Admin
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/EnvironmentPath'
      responses:
        '200':
          description: Sync result for the requested Razorpay environment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncRazorpayPaymentsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/payments/razorpay/{environment}/webhook:
    post:
      summary: Configure Razorpay Webhook Settings
      description: Generate or refresh the local Razorpay webhook URL and signing secret for one environment. Copy the returned URL into the Razorpay Dashboard.
      tags:
        - Admin
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/EnvironmentPath'
      responses:
        '200':
          description: Razorpay webhook configuration result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigureRazorpayWebhookResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/payments/razorpay/{environment}/catalog:
    get:
      summary: List Razorpay Payment Catalog
      description: Return mirrored Razorpay items and plans for one environment.
      tags:
        - Admin
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/EnvironmentPath'
      responses:
        '200':
          description: Synced Razorpay items and plans
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListRazorpayCatalogResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/payments/razorpay/{environment}/subscriptions:
    get:
      summary: List Razorpay Subscriptions
      description: Admin/debug read for mirrored Razorpay subscriptions. Use app-owned tables with RLS for end-user payment state.
      tags:
        - Admin
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/EnvironmentPath'
        - $ref: '#/components/parameters/SubjectTypeQuery'
        - $ref: '#/components/parameters/SubjectIdQuery'
        - $ref: '#/components/parameters/LimitQuery'
      responses:
        '200':
          description: Razorpay subscriptions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListRazorpaySubscriptionsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/payments/razorpay/{environment}/customers:
    get:
      summary: List Razorpay Customers
      description: Admin/debug read for mirrored Razorpay customers. This is a display mirror only and should not replace app-owned billing tables.
      tags:
        - Admin
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/EnvironmentPath'
        - $ref: '#/components/parameters/LimitQuery'
      responses:
        '200':
          description: Razorpay customers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListPaymentCustomersResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/payments/razorpay/{environment}/payment-activity:
    get:
      summary: List Razorpay Payment Activity
      description: Admin/debug read for mirrored Razorpay payment activity. Use app-owned fulfillment tables with RLS for end-user order, credit, or entitlement state.
      tags:
        - Admin
      security:
        - bearerAuth: []
        - apiKey: []
      parameters:
        - $ref: '#/components/parameters/EnvironmentPath'
        - $ref: '#/components/parameters/SubjectTypeQuery'
        - $ref: '#/components/parameters/SubjectIdQuery'
        - $ref: '#/components/parameters/LimitQuery'
      responses:
        '200':
          description: Razorpay payment activity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListPaymentActivityResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/webhooks/stripe/{environment}:
    post:
      summary: Receive Stripe Webhook
      description: Receive Stripe events for one environment. The request body must be the raw Stripe JSON body and must include the Stripe signature header.
      tags:
        - Webhooks
      security:
        - stripeSignature: []
      parameters:
        - $ref: '#/components/parameters/EnvironmentPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Webhook received
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StripeWebhookResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/webhooks/razorpay/{environment}:
    post:
      summary: Receive Razorpay Webhook
      description: Receive Razorpay events for one environment. The request body must be the raw Razorpay JSON body and must include the Razorpay signature header.
      tags:
        - Webhooks
      security:
        - razorpaySignature: []
      parameters:
        - $ref: '#/components/parameters/EnvironmentPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Webhook received
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RazorpayWebhookResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    apiKey:
      type: apiKey
      in: header
      name: x-api-key
    stripeSignature:
      type: apiKey
      in: header
      name: stripe-signature
    razorpaySignature:
      type: apiKey
      in: header
      name: x-razorpay-signature

  parameters:
    EnvironmentPath:
      name: environment
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/StripeEnvironment'
      description: Payment provider environment.
    ProductIdPath:
      name: productId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
      description: Stripe product ID.
      example: "prod_123"
    PriceIdPath:
      name: priceId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
      description: Stripe price ID.
      example: "price_123"
    SubjectTypeQuery:
      name: subjectType
      in: query
      required: false
      schema:
        type: string
        minLength: 1
        maxLength: 100
      description: Billing subject type. Must be provided together with subjectId.
      example: "team"
    SubjectIdQuery:
      name: subjectId
      in: query
      required: false
      schema:
        type: string
        minLength: 1
        maxLength: 255
      description: Billing subject ID. Must be provided together with subjectType.
      example: "team_123"
    LimitQuery:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50
      description: Maximum rows to return.

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    StripeEnvironment:
      type: string
      enum:
        - test
        - live

    PaymentProvider:
      type: string
      enum:
        - stripe
        - razorpay

    StripeConnectionStatus:
      type: string
      enum:
        - unconfigured
        - connected
        - error

    StripeLatestSyncStatus:
      type: string
      enum:
        - succeeded
        - failed

    RazorpayConnectionStatus:
      type: string
      enum:
        - unconfigured
        - connected
        - error

    RazorpayLatestSyncStatus:
      type: string
      enum:
        - succeeded
        - failed

    Metadata:
      type: object
      additionalProperties:
        type: string

    ErrorResponse:
      type: object
      required:
        - error
        - message
        - statusCode
      properties:
        error:
          type: string
          example: "INVALID_INPUT"
        message:
          type: string
          example: "environment: Invalid enum value"
        statusCode:
          type: integer
          example: 400
        nextActions:
          type: string
          nullable: true

    StripeConnection:
      type: object
      required:
        - environment
        - status
        - accountId
        - accountEmail
        - accountLivemode
        - webhookEndpointId
        - webhookEndpointUrl
        - webhookConfiguredAt
        - maskedKey
        - lastSyncedAt
        - lastSyncStatus
        - lastSyncError
        - lastSyncCounts
      properties:
        environment:
          $ref: '#/components/schemas/StripeEnvironment'
        status:
          $ref: '#/components/schemas/StripeConnectionStatus'
        accountId:
          type: string
          nullable: true
          example: "acct_123"
        accountEmail:
          type: string
          nullable: true
          example: "owner@example.com"
        accountLivemode:
          type: boolean
          nullable: true
        webhookEndpointId:
          type: string
          nullable: true
          example: "we_123"
        webhookEndpointUrl:
          type: string
          nullable: true
          example: "https://api.example.com/api/webhooks/stripe/test"
        webhookConfiguredAt:
          type: string
          format: date-time
          nullable: true
        maskedKey:
          type: string
          nullable: true
          example: "sk_test_...abcd"
        lastSyncedAt:
          type: string
          format: date-time
          nullable: true
        lastSyncStatus:
          allOf:
            - $ref: '#/components/schemas/StripeLatestSyncStatus'
          nullable: true
        lastSyncError:
          type: string
          nullable: true
        lastSyncCounts:
          type: object
          additionalProperties:
            type: number

    RazorpayConnection:
      type: object
      required:
        - environment
        - status
        - accountId
        - merchantName
        - accountLivemode
        - webhookEndpointId
        - webhookEndpointUrl
        - webhookConfiguredAt
        - maskedKey
        - lastSyncedAt
        - lastSyncStatus
        - lastSyncError
        - lastSyncCounts
      properties:
        environment:
          $ref: '#/components/schemas/StripeEnvironment'
        status:
          $ref: '#/components/schemas/RazorpayConnectionStatus'
        accountId:
          type: string
          nullable: true
          example: "acc_123"
        merchantName:
          type: string
          nullable: true
          example: "Example Merchant"
        accountLivemode:
          type: boolean
          nullable: true
        webhookEndpointId:
          type: string
          nullable: true
          example: "webhook_123"
        webhookEndpointUrl:
          type: string
          nullable: true
          example: "https://api.example.com/api/webhooks/razorpay/test"
        webhookConfiguredAt:
          type: string
          format: date-time
          nullable: true
        maskedKey:
          type: string
          nullable: true
          example: "rzp_test_...abcd"
        lastSyncedAt:
          type: string
          format: date-time
          nullable: true
        lastSyncStatus:
          allOf:
            - $ref: '#/components/schemas/RazorpayLatestSyncStatus'
          nullable: true
        lastSyncError:
          type: string
          nullable: true
        lastSyncCounts:
          type: object
          additionalProperties:
            type: number

    StripeProduct:
      type: object
      required:
        - environment
        - productId
        - name
        - description
        - active
        - defaultPriceId
        - metadata
        - syncedAt
      properties:
        environment:
          $ref: '#/components/schemas/StripeEnvironment'
        productId:
          type: string
          example: "prod_123"
        name:
          type: string
        description:
          type: string
          nullable: true
        active:
          type: boolean
        defaultPriceId:
          type: string
          nullable: true
          example: "price_123"
        metadata:
          $ref: '#/components/schemas/Metadata'
        syncedAt:
          type: string
          format: date-time

    StripePrice:
      type: object
      required:
        - environment
        - priceId
        - productId
        - active
        - currency
        - unitAmount
        - unitAmountDecimal
        - type
        - lookupKey
        - billingScheme
        - taxBehavior
        - recurringInterval
        - recurringIntervalCount
        - metadata
        - syncedAt
      properties:
        environment:
          $ref: '#/components/schemas/StripeEnvironment'
        priceId:
          type: string
          example: "price_123"
        productId:
          type: string
          nullable: true
          example: "prod_123"
        active:
          type: boolean
        currency:
          type: string
          example: "usd"
        unitAmount:
          type: integer
          nullable: true
          example: 2900
        unitAmountDecimal:
          type: string
          nullable: true
          example: "2900"
        type:
          type: string
          example: "recurring"
        lookupKey:
          type: string
          nullable: true
          example: "pro_monthly"
        billingScheme:
          type: string
          nullable: true
          example: "per_unit"
        taxBehavior:
          type: string
          nullable: true
          enum:
            - exclusive
            - inclusive
            - unspecified
          example: "unspecified"
        recurringInterval:
          type: string
          nullable: true
          enum:
            - day
            - week
            - month
            - year
          example: "month"
        recurringIntervalCount:
          type: integer
          nullable: true
          example: 1
        metadata:
          $ref: '#/components/schemas/Metadata'
        syncedAt:
          type: string
          format: date-time

    RazorpayItem:
      type: object
      required:
        - environment
        - itemId
        - name
        - description
        - active
        - amount
        - unitAmount
        - currency
        - type
        - metadata
        - providerCreatedAt
        - syncedAt
      properties:
        environment:
          $ref: '#/components/schemas/StripeEnvironment'
        itemId:
          type: string
          example: "item_123"
        name:
          type: string
          example: "Pro monthly"
        description:
          type: string
          nullable: true
        active:
          type: boolean
        amount:
          type: integer
          nullable: true
          example: 290000
        unitAmount:
          type: integer
          nullable: true
          example: 290000
        currency:
          type: string
          example: "inr"
        type:
          type: string
          nullable: true
          example: "invoice"
        metadata:
          $ref: '#/components/schemas/Metadata'
        providerCreatedAt:
          type: string
          format: date-time
          nullable: true
        syncedAt:
          type: string
          format: date-time

    RazorpayPlan:
      type: object
      required:
        - environment
        - planId
        - itemId
        - period
        - interval
        - amount
        - unitAmount
        - currency
        - active
        - metadata
        - providerCreatedAt
        - syncedAt
      properties:
        environment:
          $ref: '#/components/schemas/StripeEnvironment'
        planId:
          type: string
          example: "plan_123"
        itemId:
          type: string
          example: "item_123"
        period:
          type: string
          enum:
            - daily
            - weekly
            - monthly
            - yearly
          example: "monthly"
        interval:
          type: integer
          example: 1
        amount:
          type: integer
          nullable: true
          example: 290000
        unitAmount:
          type: integer
          nullable: true
          example: 290000
        currency:
          type: string
          example: "inr"
        active:
          type: boolean
        metadata:
          $ref: '#/components/schemas/Metadata'
        providerCreatedAt:
          type: string
          format: date-time
          nullable: true
        syncedAt:
          type: string
          format: date-time

    PaymentCustomer:
      type: object
      required:
        - environment
        - provider
        - providerCustomerId
        - email
        - name
        - phone
        - deleted
        - metadata
        - providerCreatedAt
        - syncedAt
      properties:
        environment:
          $ref: '#/components/schemas/StripeEnvironment'
        provider:
          $ref: '#/components/schemas/PaymentProvider'
        providerCustomerId:
          type: string
          example: "cus_123"
        email:
          type: string
          nullable: true
          example: "buyer@example.com"
        name:
          type: string
          nullable: true
          example: "Buyer Example"
        phone:
          type: string
          nullable: true
          example: "+1 555-0100"
        deleted:
          type: boolean
        metadata:
          $ref: '#/components/schemas/Metadata'
        providerCreatedAt:
          type: string
          format: date-time
          nullable: true
        syncedAt:
          type: string
          format: date-time

    PaymentCustomerListItem:
      allOf:
        - $ref: '#/components/schemas/PaymentCustomer'
        - type: object
          required:
            - paymentsCount
            - lastPaymentAt
            - totalSpend
            - totalSpendCurrency
            - paymentMethodBrand
            - paymentMethodLast4
            - countryCode
          properties:
            paymentsCount:
              type: integer
              minimum: 0
            lastPaymentAt:
              type: string
              format: date-time
              nullable: true
            totalSpend:
              type: integer
              minimum: 0
              nullable: true
            totalSpendCurrency:
              type: string
              nullable: true
            paymentMethodBrand:
              type: string
              nullable: true
            paymentMethodLast4:
              type: string
              nullable: true
            countryCode:
              type: string
              nullable: true
              minLength: 2
              maxLength: 2

    BillingSubject:
      type: object
      required:
        - type
        - id
      additionalProperties: false
      properties:
        type:
          type: string
          minLength: 1
          maxLength: 100
          example: "team"
        id:
          type: string
          minLength: 1
          maxLength: 255
          example: "team_123"

    CheckoutMode:
      type: string
      enum:
        - payment
        - subscription

    CheckoutSessionStatus:
      type: string
      enum:
        - initialized
        - open
        - completed
        - expired
        - failed

    CheckoutSessionPaymentStatus:
      type: string
      enum:
        - paid
        - unpaid
        - no_payment_required

    CheckoutSession:
      type: object
      required:
        - id
        - environment
        - mode
        - status
        - paymentStatus
        - subjectType
        - subjectId
        - customerEmail
        - checkoutSessionId
        - customerId
        - paymentIntentId
        - subscriptionId
        - url
        - lastError
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        environment:
          $ref: '#/components/schemas/StripeEnvironment'
        mode:
          $ref: '#/components/schemas/CheckoutMode'
        status:
          $ref: '#/components/schemas/CheckoutSessionStatus'
        paymentStatus:
          allOf:
            - $ref: '#/components/schemas/CheckoutSessionPaymentStatus'
          nullable: true
        subjectType:
          type: string
          nullable: true
        subjectId:
          type: string
          nullable: true
        customerEmail:
          type: string
          format: email
          nullable: true
        checkoutSessionId:
          type: string
          nullable: true
          example: "cs_test_123"
        customerId:
          type: string
          nullable: true
          example: "cus_123"
        paymentIntentId:
          type: string
          nullable: true
          example: "pi_123"
        subscriptionId:
          type: string
          nullable: true
          example: "sub_123"
        url:
          type: string
          nullable: true
          example: "https://checkout.stripe.com/c/pay/cs_test_123"
        lastError:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CustomerPortalSessionStatus:
      type: string
      enum:
        - initialized
        - created
        - failed

    CustomerPortalSession:
      type: object
      required:
        - id
        - environment
        - status
        - subjectType
        - subjectId
        - customerId
        - returnUrl
        - configuration
        - url
        - lastError
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        environment:
          $ref: '#/components/schemas/StripeEnvironment'
        status:
          $ref: '#/components/schemas/CustomerPortalSessionStatus'
        subjectType:
          type: string
        subjectId:
          type: string
        customerId:
          type: string
          nullable: true
          example: "cus_123"
        returnUrl:
          type: string
          nullable: true
          example: "https://app.example.com/billing"
        configuration:
          type: string
          nullable: true
        url:
          type: string
          nullable: true
          example: "https://billing.stripe.com/p/session/test_123"
        lastError:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    StripeSubscriptionStatus:
      type: string
      enum:
        - incomplete
        - incomplete_expired
        - trialing
        - active
        - past_due
        - canceled
        - unpaid
        - paused

    StripeSubscriptionItem:
      type: object
      required:
        - environment
        - subscriptionItemId
        - subscriptionId
        - productId
        - priceId
        - quantity
        - metadata
        - createdAt
        - updatedAt
      properties:
        environment:
          $ref: '#/components/schemas/StripeEnvironment'
        subscriptionItemId:
          type: string
          example: "si_123"
        subscriptionId:
          type: string
          example: "sub_123"
        productId:
          type: string
          nullable: true
          example: "prod_123"
        priceId:
          type: string
          nullable: true
          example: "price_123"
        quantity:
          type: integer
          nullable: true
          example: 1
        metadata:
          $ref: '#/components/schemas/Metadata'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    StripeSubscription:
      type: object
      required:
        - environment
        - subscriptionId
        - customerId
        - subjectType
        - subjectId
        - status
        - currentPeriodStart
        - currentPeriodEnd
        - cancelAtPeriodEnd
        - cancelAt
        - canceledAt
        - trialStart
        - trialEnd
        - latestInvoiceId
        - metadata
        - syncedAt
        - createdAt
        - updatedAt
        - items
      properties:
        environment:
          $ref: '#/components/schemas/StripeEnvironment'
        subscriptionId:
          type: string
          example: "sub_123"
        customerId:
          type: string
          nullable: true
          example: "cus_123"
        subjectType:
          type: string
          nullable: true
        subjectId:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/StripeSubscriptionStatus'
        currentPeriodStart:
          type: string
          format: date-time
          nullable: true
        currentPeriodEnd:
          type: string
          format: date-time
          nullable: true
        cancelAtPeriodEnd:
          type: boolean
        cancelAt:
          type: string
          format: date-time
          nullable: true
        canceledAt:
          type: string
          format: date-time
          nullable: true
        trialStart:
          type: string
          format: date-time
          nullable: true
        trialEnd:
          type: string
          format: date-time
          nullable: true
        latestInvoiceId:
          type: string
          nullable: true
          example: "in_123"
        metadata:
          $ref: '#/components/schemas/Metadata'
        syncedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        items:
          type: array
          items:
            $ref: '#/components/schemas/StripeSubscriptionItem'

    RazorpaySubscriptionStatus:
      type: string
      enum:
        - created
        - authenticated
