name: E2E Tests

on:
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

jobs:
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Create .env file
        run: |
          cat > .env << EOF
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=postgres
          POSTGRES_DB=growfoundry
          DATABASE_URL=postgresql://postgres:postgres@postgres:5432/growfoundry
          JWT_SECRET=test-secret-key-for-ci-cd-pipeline
          ROOT_ADMIN_USERNAME=admin
          ROOT_ADMIN_PASSWORD=test-admin-password-for-ci
          TEST_API_BASE=http://localhost:7130/api
          GROWFOUNDRY_DISABLE_WRITE_RATE_LIMIT=1
          EOF

      - name: Start Docker Compose services
        run: docker compose up -d

      - name: Wait for PostgreSQL to be ready
        run: |
          echo "Waiting for PostgreSQL..."
          timeout 60 bash -c 'until docker compose exec -T postgres pg_isready -U postgres; do sleep 2; done'

      - name: Wait for GrowFoundry backend to be ready
        run: |
          echo "Waiting for GrowFoundry backend..."
          timeout 180 bash -c 'until curl -f http://localhost:7130/api/health 2>/dev/null; do echo "Waiting..."; sleep 5; done'
          echo "Backend is ready!"

      - name: Install test dependencies in container
        run: docker compose exec -T growfoundry apk add --no-cache bash curl jq postgresql-client

      - name: Run E2E tests
        run: docker compose exec -T growfoundry npm run test:e2e

      - name: Show container logs on failure
        if: failure()
        run: |
          echo "=== PostgreSQL logs ==="
          docker compose logs postgres
          echo ""
          echo "=== GrowFoundry backend logs ==="
          docker compose logs growfoundry
          echo ""
          echo "=== PostgREST logs ==="
          docker compose logs postgrest

      - name: Cleanup
        if: always()
        run: docker compose down -v
