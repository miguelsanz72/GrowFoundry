name: Frontend Tests

on:
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dashboard-unit-tests:
    name: Dashboard Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run dashboard unit tests
        run: pnpm --filter @growfoundry/dashboard run test:unit

  dashboard-component-tests:
    name: Dashboard Component Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run dashboard component tests
        run: pnpm --filter @growfoundry/dashboard run test:component

  ui-unit-tests:
    name: UI Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run UI unit tests
        run: pnpm --filter @growfoundry/ui run test:unit

  ui-component-tests:
    name: UI Component Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run UI component tests
        run: pnpm --filter @growfoundry/ui run test:component

  dashboard-e2e-tests:
    name: Dashboard E2E Tests
    runs-on: ubuntu-latest
    needs:
      - dashboard-unit-tests
      - dashboard-component-tests
      - ui-unit-tests
      - ui-component-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run dashboard E2E tests
        run: pnpm --filter @growfoundry/dashboard run test:ui

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-playwright-results
          path: |
            packages/dashboard/playwright-report/
            packages/dashboard/test-results/
          retention-days: 7
